[package]
name = "forge"
version = "0.1.0"
edition = "2021"
description = "Terminal-first AI coding agent"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# CLI & TUI
clap = { version = "4", features = ["derive"] }
ratatui = "0.29"
crossterm = "0.28"

# HTTP & API
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
reqwest-eventsource = "0.6"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# File watching & operations
notify = "7"
walkdir = "2"
ignore = "0.4"  # Respects .gitignore
grep = "0.3"

# Code parsing
tree-sitter = "0.24"
tree-sitter-rust = "0.23"
tree-sitter-python = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-go = "0.23"

# Embeddings & vector search
fastembed = "4"

# Git operations
git2 = "0.19"

# Utils
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
dirs = "5"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
regex = "1"
similar = "2"  # For diff generation
shellexpand = "3"

# Markdown rendering
termimad = "0.30"

[[bin]]
name = "forge"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1
strip = true
