[package]
name = "forge"
version = "0.4.0"
edition = "2021"
description = "Terminal-first AI coding agent"
license = "MIT"
repository = "https://github.com/tharunmarella/forge-rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# CLI & TUI
clap = { version = "4", features = ["derive"] }
ratatui = "0.29"
crossterm = "0.28"

# HTTP & API
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
reqwest-eventsource = "0.6"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# File watching & operations
notify = "7"
walkdir = "2"
ignore = "0.4"  # Respects .gitignore
grep = "0.3"

# Code parsing
tree-sitter = "0.24"
tree-sitter-rust = "0.23"
tree-sitter-python = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-go = "0.23"

# Git operations (no SSH/HTTPS to avoid OpenSSL dependency)
git2 = { version = "0.19", default-features = false }

# OpenSSL (vendored to avoid system dependency issues in CI)
openssl = { version = "0.10", features = ["vendored"] }

# Database for embeddings persistence
rusqlite = { version = "0.32", features = ["bundled"] }

# Utils
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "5"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
similar = "2"  # For diff generation
shellexpand = "3"
urlencoding = "2"
petgraph = "0.6"  # For PageRank graph algorithm

# Markdown rendering
termimad = "0.30"

[[bin]]
name = "forge"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1
strip = true

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
